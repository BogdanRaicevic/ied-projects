<!doctype html>
<html lang="sr-Latn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1123, initial-scale=1" />
    <title>Demo sertifikat</title>
    <link rel="stylesheet" href="./certificate.css" />
  </head>
  <body>
    <section class="certificate-page" data-template-key="perm">
      <div class="certificate-border">
        <span class="corner-block corner-block-tr" aria-hidden="true"></span>
        <span class="corner-block corner-block-bl" aria-hidden="true"></span>
        <span class="corner-accent corner-accent-tr" aria-hidden="true"></span>
        <span class="corner-accent corner-accent-bl" aria-hidden="true"></span>

        <header class="certificate-header" aria-label="Izdavalac sertifikata">
          <img src="./logo-perm.png" alt="Permanent Educom" class="company-logo" />
          <p class="company-name">Permanent Educom</p>
          <p class="company-location">Beograd</p>
        </header>

        <main class="certificate-body">
          <h1 class="certificate-title">Sertifikat</h1>
          <p class="eyebrow">Ovim se potvrđuje učešće na programu profesionalnog usavršavanja</p>

          <p class="seminar-name">
            Upravljanje bezbednošću i zdravljem na radu u savremenom poslovnom
            okruženju
          </p>

          <h2 class="recipient-name">Jelena Petrović</h2>
        </main>

        <footer class="certificate-footer">
          <div class="footer-field certificate-place-date">
            <span>Beograd, 24. april 2026. godine</span>
            <strong>Sertifikat br. 125/26</strong>
          </div>
          <div class="footer-field certificate-issuer">
            <em>Permanent Educom</em>
          </div>
        </footer>
      </div>
    </section>
  </body>
</html>
