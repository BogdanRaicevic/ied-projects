<!doctype html>
<html lang="sr-Latn">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1123, initial-scale=1" />
    <title>Demo sertifikat</title>
    <link rel="stylesheet" href="./certificate.css" />
  </head>
  <body>
    <section class="certificate-page" data-template-key="ied">
      <div class="certificate-border">
        <header class="certificate-header" aria-label="Izdavalac sertifikata">
          <img src="./logo-ied.png" alt="Institut za Ekonomsku Diplomatiju" class="institute-logo" />
          <p class="institute-name">Institut za Ekonomsku Diplomatiju</p>
          <p class="institute-location">Beograd · Srbija</p>
        </header>

        <main class="certificate-body">
          <h1 class="certificate-title">Sertifikat</h1>
          <p class="eyebrow">O odslušanom programu profesionalnog usavršavanja</p>

          <p class="seminar-name">
            Upravljanje bezbednošću i zdravljem na radu u savremenom poslovnom
            okruženju
          </p>

          <h2 class="recipient-name">Jelena Petrović</h2>
        </main>

        <footer class="certificate-footer">
          <div class="footer-field certificate-number">
            <span>Broj sertifikata</span>
            <strong>12526</strong>
          </div>

          <div class="footer-field certificate-date">
            <span>Datum seminara</span>
            <strong>24. april 2026.</strong>
          </div>

          <div class="footer-field institute-footer">
            <span>Institut za Ekonomsku Diplomatiju</span>
            <img
              src="./signature.png"
              alt="Potpis ovlašćenog predstavnika"
              class="signature-mark"
            />
            <img src="./stamp.png" alt="" class="stamp-mark" aria-hidden="true" />
          </div>
        </footer>
      </div>
    </section>
  </body>
</html>
